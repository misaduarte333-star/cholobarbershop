name: Deploy to EC2 (Easypanel)

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: actions/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha,format=short
            latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Si usas Easypanel con Webhooks, podrías llamar al webhook aquí.
            # Pero lo más directo es forzar el pull y reinicio si es un App Service.
            # En Easypanel, los servicios suelen autorefresh si se usa la imagen correctat o vian webhook.
            # Aquí forzamos un update genérico si tienes acceso a docker cli.
            docker pull ghcr.io/${{ github.repository }}:latest
            # Nota: Easypanel gestiona sus propios contenedores. 
            # Si configuraste el servicio en Easypanel para usar esta imagen, 
            # podrías disparar el 'Redeploy' vía su API/Webhook.
            echo "Imagen subida. Por favor, asegúrate de configurar el Webhook en Easypanel o darle a 'Redeploy'."
